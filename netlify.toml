[build]
  publish = "build"
  functions = "netlify/functions"
  command = "docusaurus build"

[build.processing]
  skip_processing = false

[build.cache]
  include = "node_modules/**"

[functions."sync-books-algolia"]
  schedule = "@daily"

[dev]
  command = "docusaurus start"
  targetPort = 3000
  port = 8888
  functions = "netlify/functions"
  startTimeout = 180

[[headers]]
  for = "/private-blog/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://cdn.jsdelivr.net https://giscus.app https://giscus.github.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://giscus.app; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https://api.notion.com https://*.algolia.net https://identity.netlify.com https://api.github.com https://giscus.app wss://* ws://; frame-src 'self' https://giscus.app; form-action 'self';"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src * 'unsafe-inline' 'unsafe-eval'; connect-src *; img-src * data:; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'; frame-src *;"

[[redirects]]
  # ensure Netlify serves the CMS config YAML file directly (avoid SPA rewrite)
  from = "/admin/config.yml"
  to = "/admin/config.yml"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

